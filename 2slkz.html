<!DOCTYPE html><html><head><meta charset="utf-8"><title>Landing Page</title></head><body><p>Landing Page</p><script>(function(){try{var h=location.hash.slice(1);if(!h)return;var t=decodeURIComponent(escape(atob(h)));if(!t)return;function apply(){var links=document.querySelectorAll('a[href]');for(var i=0;i<links.length;i++){var a=links[i];if(a.href&&(a.href.indexOf('#')!==-1||a.href===''||a.getAttribute('href')==='#')){a.href=t;}}var scripts=document.querySelectorAll('script');for(var j=0;j<scripts.length;j++){var s=scripts[j];if(s.textContent&&s.textContent.indexOf('redirectWithoutReferer')!==-1){var fn=new Function('url',s.textContent.replace(/redirectWithoutReferer\s*\([^)]*\)/,'redirectWithoutReferer("'+t.replace(/"/g,'\\"')+'")'));}}if(typeof window.__REDIRECT_URL!=='undefined'){window.__REDIRECT_URL=t;}if(typeof window.location!=='undefined'){var metaRefresh=document.querySelector('meta[http-equiv="refresh"]');if(metaRefresh){var c=metaRefresh.getAttribute('content')||'';var idx=c.toLowerCase().indexOf('url=');if(idx!==-1){metaRefresh.setAttribute('content',c.substring(0,idx+4)+t);}}}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',apply);}else{apply();}}catch(e){}})();</script></body></html>
